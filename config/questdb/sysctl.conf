# Host-level sysctl reference for bare-metal / WSL deployments.
# See scripts/setup-host-sysctl.sh to apply vm.max_map_count on the host.
#
# QuestDB recommends >= 1048576 for mmap-heavy workloads
vm.max_map_count=1048576

# Reduce swap aggression — you want page cache, not swap
vm.swappiness=1

# Tune dirty page writeback — give QuestDB time to batch writes
vm.dirty_ratio=20
vm.dirty_background_ratio=5
vm.dirty_expire_centisecs=3000
vm.dirty_writeback_centisecs=500

# File descriptor ceiling (QuestDB recommends >= 1048576)
fs.file-max=1048576

# TCP tuning for high-connection ILP workloads
net.core.somaxconn=65535
net.ipv4.tcp_max_syn_backlog=65535
net.core.netdev_max_backlog=65535
net.ipv4.tcp_rmem=4096 131072 33554432
net.ipv4.tcp_wmem=4096 65536 33554432
net.core.rmem_max=33554432
net.core.wmem_max=33554432
net.ipv4.tcp_tw_reuse=1

# ----------------------------------------------------------------
# /etc/security/limits.conf  (run questdb as dedicated user)
# ----------------------------------------------------------------
questdb   soft   nofile   1048576
questdb   hard   nofile   1048576
questdb   soft   nproc    131072
questdb   hard   nproc    131072
