# ================================================================
# QuestDB server.conf
# Target: 64 GB RAM | 32 vCPU | 500 GB SSD (NVMe assumed)
# Bias: high-throughput ILP ingest + PGWire frontend
# ================================================================

# ----------------------------------------------------------------
# WORKERS  (32 cores → leave ~2 for OS + GC threads)
# ----------------------------------------------------------------
# SQL engine, general execution
shared.worker.count=10
shared.worker.yield.threshold=500
shared.worker.sleep.threshold=5000

# REST API / web console
http.worker.count=4
http.worker.yield.threshold=500
http.worker.sleep.threshold=10000

# ILP socket I/O — this is your hot path
line.tcp.io.worker.count=8
# ILP message parsing/routing
line.tcp.worker.count=8
line.tcp.worker.yield.threshold=200
line.tcp.worker.sleep.threshold=2000

# PGWire (your router frontend)
pg.worker.count=4
pg.worker.yield.threshold=500
pg.worker.sleep.threshold=5000

# WAL apply (async write path)
cairo.wal.apply.worker.count=4

# ----------------------------------------------------------------
# ILP / LINE PROTOCOL
# ----------------------------------------------------------------
line.tcp.enabled=true
line.tcp.net.connection.limit=2048
line.tcp.recv.buffer.size=8m
line.tcp.msg.buffer.size=8m
# buffer more before flushing
line.tcp.max.uncommitted.rows=100000
# flush every 1s (tune per latency SLA)
line.tcp.commit.interval.ms=1000
line.tcp.maintenance.job.hysteresis.in.ms=1000
# switch to HOUR if >10M rows/day/symbol
line.tcp.default.partition.by=DAY

# ----------------------------------------------------------------
# HTTP REST API
# ----------------------------------------------------------------
http.enabled=true
http.net.connection.limit=1024
http.receive.buffer.size=8m
http.send.buffer.size=8m
http.request.header.buffer.size=128k
http.multipart.header.buffer.size=1k
http.query.cache.enabled=true
http.query.cache.block.count=32
http.query.cache.row.count=64

# ----------------------------------------------------------------
# PGWIRE
# ----------------------------------------------------------------
pg.enabled=true
pg.net.connection.limit=512
pg.recv.buffer.size=4m
pg.send.buffer.size=4m
pg.connection.pool.capacity=512
pg.max.blob.size.on.query=8m
pg.character.store.capacity=4096
pg.binary.param.count.capacity=32

# ----------------------------------------------------------------
# CAIRO STORAGE ENGINE
# ----------------------------------------------------------------
# Append page sizes — larger = fewer mmap syscalls on bulk ingest
cairo.writer.data.append.page.size=16m
cairo.writer.misc.append.page.size=4m

# Page frame sizing — affects parallelism of columnar scans
cairo.page.frame.max.rows=1000000
cairo.page.frame.min.rows=100000

# SQL operator memory (off-heap, counts against MaxDirectMemorySize)
cairo.sql.copy.buffer.size=16m
cairo.sql.sort.value.page.size=16m
cairo.sql.sort.value.max.pages=4096
cairo.sql.hash.join.value.page.size=16m
cairo.sql.hash.join.light.value.page.size=2m
cairo.sql.sort.light.value.page.size=2m
cairo.sql.groupby.virtual.store.threshold=200000
cairo.sql.analytic.column.pool.capacity=128
cairo.sql.join.context.pool.capacity=128

# ----------------------------------------------------------------
# OUT-OF-ORDER (O3) — critical for market data
# ----------------------------------------------------------------
# 10 min tolerance for late-arriving ticks
cairo.o3.max.lag=600000
# 1s minimum — avoids O3 on in-order bursts
cairo.o3.min.lag=1000
# use shared workers for O3 merge sorts
cairo.o3.quicksort.parallel=true

# ----------------------------------------------------------------
# WAL (Write-Ahead Log)
# ----------------------------------------------------------------
cairo.wal.enabled.default=true
# larger segments = less metadata churn
cairo.wal.segment.rollover.row.count=500000
cairo.wal.max.lag.txn.count=100
# purge old segments every 30s
cairo.wal.purge.interval=30000
cairo.wal.recreate.distressed.sequencer.attempts=3

# ----------------------------------------------------------------
# PARTITIONING DEFAULT
# ----------------------------------------------------------------
cairo.default.partition.by=DAY

# ----------------------------------------------------------------
# TELEMETRY (disable if air-gapped)
# ----------------------------------------------------------------
telemetry.enabled=false
