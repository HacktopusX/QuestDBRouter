services:
  questdb-0:
    image: questdb/questdb:latest
    container_name: questdb-0
    privileged: true
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo 1048576 > /proc/sys/vm/max_map_count 2>/dev/null || true
        exec /docker-entrypoint.sh
    ports:
      - "19009:9009"
      - "18812:8812"
      - "19000:9000"
    volumes:
      - questdb-0-data:/var/lib/questdb
      - ./config/questdb/server.conf:/var/lib/questdb/conf/server.conf:ro
      - ./config/questdb/jvm.options:/var/lib/questdb/conf/jvm.options:ro
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
      nproc:
        soft: 131072
        hard: 131072
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  questdb-1:
    image: questdb/questdb:latest
    container_name: questdb-1
    depends_on:
      questdb-0:
        condition: service_started
    ports:
      - "19019:9009"
      - "18822:8812"
      - "19010:9000"
    volumes:
      - questdb-1-data:/var/lib/questdb
      - ./config/questdb/server.conf:/var/lib/questdb/conf/server.conf:ro
      - ./config/questdb/jvm.options:/var/lib/questdb/conf/jvm.options:ro
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
      nproc:
        soft: 131072
        hard: 131072
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  questdb-init:
    image: postgres:16-alpine
    container_name: questdb-init
    depends_on:
      questdb-0:
        condition: service_started
      questdb-1:
        condition: service_started
    environment:
      QUESTDB_SHARDS: questdb-0:8812 questdb-1:8812
      PGPASSWORD: quest
    volumes:
      - ./scripts/questdb_init_ingest_tables.sh:/scripts/questdb_init_ingest_tables.sh:ro
    entrypoint: ["/bin/sh", "/scripts/questdb_init_ingest_tables.sh"]
    restart: "no"

  quest-router:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CARGO_PROFILE: docker
    container_name: quest-router
    ports:
      - "9009:9009"
      - "8812:8812"
      - "9090:9090"
      - "8080:8080"
      - "9010:9010"
    depends_on:
      questdb-0:
        condition: service_started
      questdb-1:
        condition: service_started
      questdb-init:
        condition: service_completed_successfully
    volumes:
      - ./config/docker-quest-router-objectstorage.toml:/config/quest-router.toml:ro
      - ingest-checkpoint:/var/lib/quest-router
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    command: /data
    environment:
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUSTFS_CONSOLE_ENABLE=true
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs-data:/data
    restart: unless-stopped

volumes:
  questdb-0-data:
  questdb-1-data:
  rustfs-data:
  ingest-checkpoint:
